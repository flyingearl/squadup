; Production PHP overrides. Shipped only in the `prod` Dockerfile stage.
; Differs from docker/php/php.ini (dev) in opcache settings: we trust
; that the code is frozen at build time, so opcache never re-checks
; file mtimes — max throughput, no reload overhead.

memory_limit = 512M
upload_max_filesize = 10M
post_max_size = 10M
max_execution_time = 60
date.timezone = UTC
expose_php = off

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
; Code is baked into the image; never revalidate.
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
