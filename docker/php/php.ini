; App-level PHP overrides. Loaded as /usr/local/etc/php/conf.d/zz-app.ini
; so it overrides anything in the default php.ini.

memory_limit = 512M
upload_max_filesize = 10M
post_max_size = 10M
max_execution_time = 60
date.timezone = UTC

; Opcache — dev-friendly (revalidates every request).
; Production ini will set validate_timestamps = 0 for max speed.
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
