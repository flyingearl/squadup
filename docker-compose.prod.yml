# Production overlay. Compose merges this on top of docker-compose.yml
# when run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# The dev override file (docker-compose.override.yml) is NOT loaded when
# -f flags are passed explicitly, so the Vite container is absent AND the
# dev bind mounts (`.:/var/www/html`) are absent — prod runs entirely
# from the baked image.
#
# Differences from dev:
#   - build.target: prod   — multi-stage Dockerfile picks the prod stage
#   - image: squadup/app:prod on every PHP-side service so they share
#     the built image rather than attempting to rebuild four times
#   - APP_ENV=production   — disables debug features, enables caches
#   - APP_DEBUG=false      — no error traces in responses

services:
  app:
    build:
      context: .
      target: prod
    image: squadup/app:prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: web

  reverb:
    image: squadup/app:prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: reverb

  queue-worker:
    image: squadup/app:prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: queue

  scheduler:
    image: squadup/app:prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: scheduler
