# Base compose file — dev-oriented for now. A prod override will be
# added once the Dockerfile grows a dedicated prod stage (Phase 0, commit 5).
#
# Current services: traefik (LB), app x2 (web), reverb (websockets),
# queue-worker, scheduler, postgres, redis, minio, mailpit,
# minio-init (one-shot bucket bootstrap).
#
# All PHP-side services share the `squadup/app:dev` image. CONTAINER_ROLE
# distinguishes them at boot so only `web` runs migrations (avoids races).

services:
  # Reverse proxy + load balancer. Uses the Docker provider, so services opt
  # into being routable by adding `traefik.*` labels — no separate config
  # file to maintain. Dashboard on :8081 shows discovered routes and
  # per-replica health, which is how we'll verify round-robin below.
  traefik:
    image: traefik:v3.1
    container_name: squadup-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true                          # Dashboard on plain HTTP — dev only.
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false    # Opt-in: services must set traefik.enable=true.
      - --entrypoints.web.address=:80
      - --entrypoints.traefik.address=:8080          # Dashboard entrypoint (internal).
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "8080:80"       # App entry — same host port as before so muscle memory survives.
      - "8081:8080"     # Traefik dashboard at http://localhost:8081
    volumes:
      # Docker provider reads container labels through the socket.
      # Read-only: Traefik only needs to list and watch, never mutate.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - app
    networks:
      - squadup

  app:
    build:
      context: .
      target: dev    # prod overlay (docker-compose.prod.yml) switches to `prod`
    image: squadup/app:dev
    # container_name removed: Compose must be free to name replicas
    # (squadup-app-1, squadup-app-2) without collisions.
    restart: unless-stopped
    # No host ports — Traefik fronts the app on :80 of the squadup network.
    # No bind mount here: dev adds `.:/var/www/html` via the override file;
    # prod runs entirely from the baked image.
    env_file:
      - .env
    environment:
      # Web replicas own migrations. See docker/entrypoint.sh.
      CONTAINER_ROLE: web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      # Two replicas behind Traefik. Round-robin proof:
      #   for i in 1 2 3 4; do curl -sI http://localhost:8080 | grep -i served-by; done
      replicas: 2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`localhost`) || Host(`127.0.0.1`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=80"
      # Use nginx's /up endpoint as the per-replica Traefik healthcheck — a
      # failing replica is pulled out of rotation automatically.
      - "traefik.http.services.app.loadbalancer.healthcheck.path=/up"
      - "traefik.http.services.app.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.app.loadbalancer.healthcheck.timeout=3s"
    networks:
      - squadup

  # Laravel's native websocket server. Broadcasts events to connected browsers
  # for DMs, notifications, and LFG join requests (wired up in later phases).
  # Runs the same app image but overrides CMD to start the Reverb daemon.
  # Browsers connect directly via localhost:8082 — not through Traefik for
  # now, since WebSocket routing adds Traefik labels we don't need yet.
  reverb:
    image: squadup/app:dev
    container_name: squadup-reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8082:8080"
    # Dev override adds `.:/var/www/html`; prod runs from the baked image.
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: reverb
    # The image-level HEALTHCHECK hits `/up` on nginx — irrelevant here.
    # Docker already reports this container as running; that's sufficient.
    healthcheck:
      disable: true
    depends_on:
      app:
        condition: service_started    # waits for the image build and for migrations to run
      redis:
        condition: service_healthy
    networks:
      - squadup

  # Processes queued jobs: notification fanout, image post-processing,
  # scheduled broadcast emits, etc. Restart policy ensures a crashed
  # worker respawns — real prod would use horizon but we're explicit here.
  queue-worker:
    image: squadup/app:dev
    container_name: squadup-queue-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--queue=default", "--tries=3", "--timeout=90", "--sleep=1"]
    # Dev override adds `.:/var/www/html`; prod runs from the baked image.
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: queue
    healthcheck:
      disable: true    # no nginx in this role; process liveness is enough
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - squadup

  # Cron replacement. `schedule:work` is Laravel 11+ native — keeps a loop
  # running and dispatches scheduled tasks every minute. No host cron needed.
  scheduler:
    image: squadup/app:dev
    container_name: squadup-scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    # Dev override adds `.:/var/www/html`; prod runs from the baked image.
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
    healthcheck:
      disable: true    # no nginx in this role; process liveness is enough
    depends_on:
      app:
        condition: service_started
    networks:
      - squadup

  # Catches all outbound mail in dev. Swap MAIL_MAILER -> smtp and point at
  # a real provider in prod by changing env vars only.
  mailpit:
    image: axllent/mailpit:latest
    container_name: squadup-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"    # SMTP — what Laravel connects to
      - "8025:8025"    # Web UI — http://localhost:8025
    networks:
      - squadup

  # One-shot: waits for MinIO to be up, creates the `squadup` bucket if
  # missing, sets a permissive download policy so dev uploads are viewable
  # via direct URL. Exits 0 after running; compose treats that as success.
  minio-init:
    image: minio/mc:latest
    container_name: squadup-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/$${AWS_BUCKET};
      mc anonymous set download local/$${AWS_BUCKET};
      echo \"minio-init: bucket $${AWS_BUCKET} ready.\";
      "
    env_file:
      - .env
    networks:
      - squadup

  postgres:
    image: postgres:16-bookworm
    container_name: squadup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-squadup}
      POSTGRES_USER: ${DB_USERNAME:-squadup}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-squadup}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run in alphabetical order on the first-ever boot of
      # a fresh data volume. Existing volumes skip this — see README for
      # the one-liner to create the test DB on an already-populated volume.
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-squadup} -d ${DB_DATABASE:-squadup}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - squadup

  redis:
    image: redis:7-bookworm
    container_name: squadup-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - squadup

  minio:
    image: minio/minio:latest
    container_name: squadup-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-squadup}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-squadup-secret}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    networks:
      - squadup

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  squadup:
    driver: bridge
